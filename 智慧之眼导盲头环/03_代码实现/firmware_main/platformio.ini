; ============================================================
;  智慧之眼导盲头环 - 主控板 (ESP32-S3 N16R8)
;  版本: v1.0
;  更新日期: 2026-07-10
;
;  功能职责:
;    1. 毫米波雷达数据读取与解析（前/后 RD03D）
;    2. 视觉算法处理（盲道检测 / 红绿灯识别 / 斑马线识别）
;    3. 多传感器数据融合与预警决策
;    4. 蜂鸣器 + 振动马达反馈输出
;    5. 系统状态管理与调试接口
;
;  编译烧录方式:
;    方法1 (推荐): VS Code + PlatformIO 插件 → 点 Upload 按钮
;    方法2: 命令行 → pio run -t upload
;    方法3: esptool.py 直接烧录 bin 文件
; ============================================================

[env:esp32-s3-n16r8]
platform = espressif32@6.4.0
board = esp32-s3-devkitc-1
framework = arduino, espidf
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder

; ---------- Flash 配置 ----------
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB

; ---------- 编译选项 ----------
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_FREERTOS_HZ=1000
    -D CONFIG_ESP_MAIN_TASK_STACK_SIZE=8192

; ---------- 编译源文件目录 ----------
src_filter =
    +<*>

; ---------- 第三方库依赖 ----------
lib_deps =
