; ============================================================
;  智慧之眼导盲头环 - 摄像头板 (ESP32-S3 WROOM)
;  版本: v1.0
;  更新日期: 2026-07-10
;
;  功能职责:
;    1. OV2640 摄像头驱动与图像采集
;    2. 图像预处理（缩放 / 裁剪 / 格式转换）
;    3. SPI 主机通信 - 向主控板发送图像数据
;    4. 接收主控板控制指令（分辨率 / 帧率调整）
;    5. 心跳保活与链路监控
;
;  编译烧录方式:
;    方法1 (推荐): VS Code + PlatformIO 插件 → 点 Upload 按钮
;    方法2: 命令行 → pio run -t upload
;    方法3: esptool.py 直接烧录 bin 文件
; ============================================================

[env:esp32-s3-wroom]
platform = espressif32@6.4.0
board = esp32-s3-devkitc-1
framework = arduino, espidf
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder

; ---------- Flash 配置 ----------
board_build.partitions = default_8MB.csv
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_upload.flash_size = 8MB

; ---------- 编译选项 ----------
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_FREERTOS_HZ=1000
    -D CONFIG_ESP_MAIN_TASK_STACK_SIZE=8192

; ---------- 编译源文件目录 ----------
src_filter =
    +<*>

; ---------- 第三方库依赖 ----------
lib_deps =
